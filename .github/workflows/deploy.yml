# Professional CI/CD for Fleetflows (Web + Mobile)
# Place this file in .github/workflows/deploy.yml
#
# Required GitHub Secrets:
#   VPS_SSH_KEY      - Your private SSH key (no passphrase)
#   VPS_HOST         - Your VPS IP (e.g., 82.29.161.186)
#   VPS_USER         - Your VPS username (e.g., root)
# Optional GitHub Secrets:
#   APP_PATH         - Path to your app on the VPS (defaults to /root/Fleetflows)
#   APP_SERVICE      - systemd service name (defaults to fleetflows, falls back to nohup if missing)
#   EXPO_TOKEN       - For Expo publishing if needed

name: CI/CD Deploy to VPS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20


      - name: Install dependencies (Web)
        run: |
          npm ci

      - name: Build Web App
        run: |
          npm run build

      - name: Lint Web App
        run: |
          npm run lint
        continue-on-error: true


      - name: Install dependencies (Mobile)
        run: |
          cd mobile
          npm ci

      # Optional: Build Mobile App (Expo)
      # - name: Build Mobile App
      #   run: |
      #     cd Fleetflows/mobile
      #     npx expo export:web

      # --- Deployment ---
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            BRANCH="${{ github.ref_name }}"
            APP_PATH="${{ secrets.APP_PATH }}"
            SERVICE_NAME="${{ secrets.APP_SERVICE }}"

            if [ -z "$APP_PATH" ]; then
              APP_PATH="/root/Fleetflows"
            fi

            if [ -z "$SERVICE_NAME" ]; then
              SERVICE_NAME="fleetflows"
            fi

            cd "$APP_PATH"

            if [ ! -d ".git" ]; then
              echo "APP_PATH must point to the git project folder. Missing .git in $APP_PATH"
              exit 1
            fi

            git fetch origin "$BRANCH"
            git switch "$BRANCH" || git switch -c "$BRANCH" --track "origin/$BRANCH"
            git pull --ff-only origin "$BRANCH"
            npm ci
            npx prisma migrate deploy
            npm run build
            if sudo systemctl list-unit-files | grep -q "^${SERVICE_NAME}\.service"; then
              sudo systemctl restart "$SERVICE_NAME"
            else
              pkill -f "next start -p 3000" || true
              nohup npm run start -- -p 3000 > app.log 2>&1 < /dev/null &
            fi

      - name: Success Notification
        if: success()
        run: echo "✅ Deployment successful!"

      - name: Failure Notification
        if: failure()
        run: echo "❌ Deployment failed! Check logs."
