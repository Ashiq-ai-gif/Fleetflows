# Professional CI/CD for Fleetflows (Web + Mobile)
# Place this file in .github/workflows/deploy.yml
#
# Required GitHub Secrets:
#   VPS_SSH_KEY      - Your private SSH key (no passphrase)
#   VPS_HOST         - Your VPS IP (e.g., 82.29.161.186)
#   VPS_USER         - Your VPS username (e.g., root)
#   APP_PATH         - Path to your app on the VPS (e.g., /root/Fleetflows)
#   (Optional) EXPO_TOKEN - For Expo publishing if needed

name: CI/CD Deploy to VPS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20


      - name: Install dependencies (Web)
        run: |
          npm ci

      - name: Build Web App
        run: |
          npm run build

      - name: Lint Web App
        run: |
          npm run lint
        continue-on-error: true

      - name: Prisma Migrate (Web)
        run: |
          npm run db:migrate

      - name: Install dependencies (Mobile)
        run: |
          cd mobile
          npm ci

      # Optional: Build Mobile App (Expo)
      # - name: Build Mobile App
      #   run: |
      #     cd Fleetflows/mobile
      #     npx expo export:web

      # --- Deployment ---
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.APP_PATH }}
            git pull origin $(git rev-parse --abbrev-ref HEAD)
            npm ci
            npm run build
            npx prisma migrate deploy
            systemctl restart fleet-flows

      - name: Success Notification
        if: success()
        run: echo "✅ Deployment successful!"

      - name: Failure Notification
        if: failure()
        run: echo "❌ Deployment failed! Check logs."
